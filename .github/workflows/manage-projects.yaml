---
name: Manage issues on the projects board

on:
  issues:
    types:
      - opened

jobs:
  add-issue-to-project:
    permissions: {}
    runs-on: ubuntu-slim
    steps:
      - name: Checkout source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          ref: ${{ github.ref }}
          repository: ${{ github.repository }}

      - uses: ./actions/add-to-project
        env:
          APP_ID: ${{ secrets.APP_ID }} # zizmor: ignore[secrets-outside-env]
          APP_PEM: ${{ secrets.APP_PEM }} # zizmor: ignore[secrets-outside-env]
        with:
          app-id: ${{ env.APP_ID }}
          app-pem: ${{ env.APP_PEM }}
