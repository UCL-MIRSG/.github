---
name: Update Terraform Lock File
description: Update terraform lock file to include hashes for both platforms

inputs:
  app-id:
    description: Application ID
    required: true

  app-pem:
    description: Application private key
    required: true

runs:
  using: composite
  steps:
    - name: Generate token
      id: generate-token
      uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
      with:
        app-id: ${{ inputs.app-id }}
        private-key: ${{ inputs.app-pem }}

    - name: Checkout source
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: true
        ref: ${{ github.head_ref || github.ref_name }}
        repository: ${{ github.repository }}
        token: ${{ steps.generate-token.outputs.token }}

    - name: Setup terraform
      uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1

    - name: Update lock file for all platforms
      shell: bash
      run: |-
        find . -name ".terraform.lock.hcl" -print0 | while IFS= read -r -d '' lockfile; do
          dir=$(dirname "$lockfile")
          echo "Initialising $dir"
          terraform -chdir="$dir" init -backend=false
          echo "Locking providers in $dir"
          terraform -chdir="$dir" providers lock \
            -platform=darwin_amd64 \
            -platform=linux_amd64
        done

    - name: Commit updated lock files
      uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
      with:
        commit_message: update terraform lock file for both platforms
        file_pattern: "**/.terraform.lock.hcl"
