---
name: Generate Terraform Documentation
description: Generate terraform documentation and push changes back to PR

inputs:
  app-id:
    description: Application ID
    required: true

  app-pem:
    description: Application private key
    required: true

  find-dir:
    description: Root directory to extract list of directories
    default: disabled

  working-dir:
    description: Directories to generate docs for
    default: .

runs:
  using: composite
  steps:
    - name: Generate token
      id: generate-token
      uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
      with:
        app-id: ${{ inputs.app-id }}
        private-key: ${{ inputs.app-pem }}

    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        persist-credentials: true
        ref: ${{ github.head_ref || github.ref_name }}
        repository: ${{ github.repository }}
        token: ${{ steps.generate-token.outputs.token }}

    - name: Render terraform docs and push changes back to PR
      uses: terraform-docs/gh-actions@6de6da0cefcc6b4b7a5cbea4d79d97060733093c # v1.4.1
      with:
        find-dir: ${{ inputs.find-dir }}
        git-push: true
        output-file: README.md
        output-method: inject
        working-dir: ${{ inputs.working-dir }}
